<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800">
  <defs>
    <filter id="caustics" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <!-- Base water noise -->
      <feTurbulence type="turbulence" baseFrequency="0.012 0.018" numOctaves="4" seed="11" result="noise"/>
      <!-- Threshold into bright caustic lines: only high-value noise passes through -->
      <feColorMatrix type="matrix" in="noise"
        values="0 0 0 0 0.72
                0 0 0 0 0.88
                0 0 0 0 1
                0 0 0 28 -14"
        result="caustic"/>
      <!-- Second layer of noise at different scale for fine detail -->
      <feTurbulence type="turbulence" baseFrequency="0.03 0.022" numOctaves="2" seed="3" result="noise2"/>
      <feColorMatrix type="matrix" in="noise2"
        values="0 0 0 0 0.8
                0 0 0 0 0.92
                0 0 0 0 1
                0 0 0 18 -10"
        result="caustic2"/>
      <feBlend in="caustic" in2="caustic2" mode="screen" result="combined"/>
    </filter>
  </defs>

  <!-- Base pool color -->
  <rect width="800" height="800" fill="#eef6fb"/>
  <!-- Caustic layer -->
  <rect width="800" height="800" filter="url(#caustics)" opacity="0.35"/>
  <!-- Subtle vignette to ground the edges -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#c8dfe8" stop-opacity="0.3"/>
  </radialGradient>
  <rect width="800" height="800" fill="url(#vignette)"/>
</svg>
